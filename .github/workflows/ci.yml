name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # mise pins the JDK, Gradle bootstrap binary, gh, and python (see
      # /mise.toml). One install gives CI and local dev the same toolchain.
      # setup-gradle below is layered on top purely for its dependency +
      # build cache — mise has no equivalent.
      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Intentionally pinned at v5 rather than v6. v6 extracted the
      # caching engine into a separately-licensed `gradle-actions-caching`
      # component (commercial Terms of Use). v5 keeps the freely-licensed
      # caching from v4 *and* runs on Node 24, so it sidesteps both the
      # Node 20 deprecation warning and the v6 license entanglement.
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      # Read major.minor from the in-tree fallback literal in build.gradle.kts
      # (the `getOrElse("X.Y.0-SNAPSHOT")` argument) and stamp the patch with
      # the CI run number. Humans bump major/minor in build.gradle.kts; CI
      # never writes back. Mirrors the pattern used by other repos in this org.
      - name: Compute version
        id: version
        run: |
          MAJOR_MINOR=$(grep -oE 'getOrElse\("[0-9]+\.[0-9]+' build.gradle.kts | head -1 | cut -d'"' -f2)
          if [[ -z "$MAJOR_MINOR" ]]; then
            echo "Could not parse major.minor from build.gradle.kts" >&2
            exit 1
          fi
          VERSION="${MAJOR_MINOR}.0-ci.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed CI version: $VERSION"

      # `mise run check` runs ktlint + every unit test on every target
      # (iosSimulatorArm64Test, macosArm64Test, testAndroidHostTest, jvmTest).
      # `mise run build:xcframework` builds the KMMBridge-consumable artifact.
      # The CI version stamp is passed through to Gradle via
      # ORG_GRADLE_PROJECT_version — the standard env-var form of
      # `-Pversion=…` so the mise tasks don't need to know CI is the caller.
      - name: Build, test, and assemble XCFramework
        env:
          ORG_GRADLE_PROJECT_version: ${{ steps.version.outputs.VERSION }}
        run: |
          mise run check
          mise run build:xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@v7
        with:
          name: __DISPLAY_NAME__-${{ steps.version.outputs.VERSION }}.xcframework
          path: src/build/XCFrameworks/release/__FRAMEWORK__.xcframework
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ steps.version.outputs.VERSION }}
          path: |
            src/build/reports/tests/
            src/build/reports/ktlint/
          if-no-files-found: ignore
