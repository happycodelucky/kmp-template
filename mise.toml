# mise — toolchain pins and task surface for the __PROJECT_NAME__ repo.
# Run `mise install` to provision tools; `mise tasks` to list runnable tasks.
#
# This file is the task contract: humans and agents (Claude/Codex) drive every
# build/test/lint/publish action through `mise run <task>`. CLAUDE.md §11 points
# here.
#
# Keep in sync with:
#   gradle/libs.versions.toml                 (Kotlin, AGP, SKIE, JDK target)
#   gradle/wrapper/gradle-wrapper.properties  (distributionUrl)
#
# Single source of truth for non-Gradle build deps. Versions for Kotlin, AGP,
# SKIE, KMMBridge, ktlint-gradle, etc. live in gradle/libs.versions.toml
# (CLAUDE.md §3) — mise must not duplicate them.
#
# Bootstrap on a fresh machine:
#   brew install mise
#   mise trust
#   mise install
#
# Xcode is NOT managed by mise. Install the latest stable Xcode that SKIE
# supports.

[tools]
java     = "temurin-21"   # JDK 21 LTS, Apple Silicon aarch64.
gradle   = "9.5.1"        # Matches gradle/wrapper/gradle-wrapper.properties.
python   = "3.12"         # mkdocs toolchain (docs:* tasks).
xcodegen = "latest"       # apps/ios + apps/macos project generation.
gh       = "latest"       # release.yml uses gh.

# Deliberately NOT pinned here:
#   - kotlin: gradle/libs.versions.toml owns it (CLAUDE.md §3).
#   - cocoapods: forbidden (CLAUDE.md §12).
#   - node: not used in this repo.

# ---------------------------------------------------------------------------
# Tasks. Naming: `domain:action`, colon-separated, lowercase. Lowercase
# ios/macos in task names is fine — these are CLI tokens, not source-identifier
# symbols. The Apple-casing rule (CLAUDE.md §7) still applies to file names,
# types, and comments.
#
# Both published modules (:src and :src-testing) are scoped explicitly where it
# matters — Gradle's `check` is per-project, so `:src:check` alone never runs
# `:src-testing`'s suite.
# ---------------------------------------------------------------------------

# --- build -----------------------------------------------------------------

[tasks."build:src"]
description = "Assemble the :src library (all production targets)."
run = "./gradlew :src:assemble"

[tasks."build:ios"]
description = "Link debug iOS framework slices (device + Apple Silicon simulator)."
run = """
./gradlew :src:linkDebugFrameworkIosArm64 \
          :src:linkDebugFrameworkIosSimulatorArm64
"""

[tasks."build:macos"]
description = "Link the debug macOS framework slice (Apple Silicon)."
run = "./gradlew :src:linkDebugFrameworkMacosArm64"

[tasks."build:android"]
description = "Assemble the Android AAR."
run = "./gradlew :src:assembleAndroidMain"

[tasks."build:jvm"]
description = "Compile + jar the JVM desktop/server target."
run = "./gradlew :src:jvmJar"

[tasks."build:xcframework"]
description = "Build the release XCFramework (all slices — iosArm64, iosSimulatorArm64, macosArm64)."
run = "./gradlew :src:assembleSrcXCFramework"

# --- test ------------------------------------------------------------------

[tasks.test]
description = "Fast inner-loop tests — macOS arm64 only (covers commonTest), both modules."
run = "./gradlew :src:macosArm64Test :src-testing:macosArm64Test"

[tasks."test:jvm"]
description = "JVM unit tests (fastest — no K/N compile), both modules."
run = "./gradlew :src:jvmTest :src-testing:jvmTest"

[tasks."test:ios"]
description = "iOS simulator arm64 tests (slower — boots a simulator), both modules."
run = "./gradlew :src:iosSimulatorArm64Test :src-testing:iosSimulatorArm64Test"

[tasks."test:android"]
description = "Android host unit tests, both modules."
run = "./gradlew :src:testAndroidHostTest :src-testing:testAndroidHostTest"

[tasks."test:apple"]
description = "Both Apple test targets (macOS arm64 + iOS simulator arm64)."
depends = ["test", "test:ios"]

[tasks."test:all"]
description = "Every test target across every platform."
depends = ["test", "test:ios", "test:android", "test:jvm"]

# --- lint / format / check -------------------------------------------------

[tasks.check]
description = "Full local check — what CI runs: ktlint + detekt + every test target, both modules."
run = "./gradlew :src:check :src-testing:check"

[tasks.lint]
description = "ktlint + detekt only (no tests), both modules."
run = "./gradlew :src:ktlintCheck :src:detekt :src-testing:ktlintCheck :src-testing:detekt"

[tasks.format]
description = "Auto-fix ktlint findings where possible, both modules."
run = "./gradlew :src:ktlintFormat :src-testing:ktlintFormat"

# --- public API / ABI ------------------------------------------------------
# The committed dumps under <module>/api/ are the reference for the public
# surface. `apiCheck` runs as part of `check` (and CI) — it fails if the public
# API changed without a deliberate `apiDump`. Review the api/ diff like any other
# code change.

[tasks."api:check"]
description = "Verify the public API/ABI matches the committed dump (also runs inside `check`)."
run = "./gradlew :src:checkKotlinAbi :src-testing:checkKotlinAbi"

[tasks."api:dump"]
description = "Regenerate the committed public API/ABI dump after an INTENTIONAL public change. Review + commit the api/ diff."
run = "./gradlew :src:updateKotlinAbi :src-testing:updateKotlinAbi"

# --- build health ----------------------------------------------------------

[tasks."dependencies:analyze"]
description = "Dependency hygiene: unused deps, api-vs-implementation misuse, undeclared transitives (dependency-analysis)."
run = "./gradlew buildHealth"

[tasks."build:doctor"]
description = "Surface Gradle Doctor build-health diagnostics (slow config, cache misuse, JVM mismatches)."
run = "./gradlew assemble --dry-run"

# --- iteration helpers (Apple) ---------------------------------------------

[tasks."spm:dev"]
description = "Rebuild the debug XCFramework and point /Package.swift at it (local dev mode)."
# KMMBridge's `spmDevBuild` builds the debug XCFramework and REWRITES the root
# /Package.swift to a `.binaryTarget(path: …)` pointing at the local build, so
# the sample apps pick up local Kotlin edits without Gradle inside Xcode. After
# the first tagged release the committed Package.swift is the *released* form (a
# remote `.binaryTarget(url:checksum:)`). The local-dev rewrite is
# working-tree-only: do NOT commit it. `mise run spm:restore` restores it.
run = "./gradlew :src:spmDevBuild"

[tasks."spm:restore"]
description = "Restore the committed (released) /Package.swift after spm:dev rewrote it."
run = "git restore Package.swift"

[tasks."xcodeproj:ios"]
description = "Generate apps/ios/iOSApp.xcodeproj from project.yml (needs xcodegen)."
dir = "apps/ios"
run = "xcodegen generate --spec project.yml"

[tasks."xcodeproj:macos"]
description = "Generate apps/macos/macOSApp.xcodeproj from project.yml."
dir = "apps/macos"
run = "xcodegen generate --spec project.yml"

# --- open (IDE / Xcode) ----------------------------------------------------

[tasks."open:ios"]
description = "spm:dev + xcodegen + open apps/ios in Xcode."
depends = ["spm:dev", "xcodeproj:ios"]
dir = "apps/ios"
run = "open iOSApp.xcodeproj"

[tasks."open:macos"]
description = "spm:dev + xcodegen + open apps/macos in Xcode."
depends = ["spm:dev", "xcodeproj:macos"]
dir = "apps/macos"
run = "open macOSApp.xcodeproj"

[tasks."open:android"]
description = "Open apps/android in Android Studio."
run = "open -a 'Android Studio' apps/android"

# --- docs ------------------------------------------------------------------
# mkdocs site lives under /docs; Dokka HTML for the public API is mirrored into
# docs/api/ by the root `copyDokkaToDocs` task.

[tasks."docs:install"]
description = "Install the pinned mkdocs toolchain into the active python."
run = "pip install -r docs/requirements.txt"

[tasks."docs:dokka"]
description = "Generate Dokka HTML and mirror it into docs/api/."
run = "./gradlew copyDokkaToDocs"

[tasks."docs:check"]
description = "Validate docs structure (nav coverage, recipes have code)."
run = "python3 docs/check.py"

[tasks."docs:serve"]
description = "Local mkdocs preview at http://localhost:8000."
depends = ["docs:dokka"]
run = "mkdocs serve"

[tasks."docs:build"]
description = "Strict mkdocs build — what CI runs."
depends = ["docs:dokka", "docs:check"]
run = "mkdocs build --strict"

[tasks."docs:build:only"]
description = "Strict mkdocs build, assuming docs:dokka + docs:check already ran (CI uses this)."
run = "mkdocs build --strict"

# --- publish ---------------------------------------------------------------

[tasks."publish:local"]
description = "Publish both modules to the local Maven repo (~/.m2)."
run = "./gradlew publishToMavenLocal"

[tasks."publish:maven"]
description = "Release to Maven Central. Bump with --major/--minor/--patch (most significant wins) or --version X; --dryrun stages only. See scripts/release.sh."
# The version is computed from the latest git tag (scripts/version.sh), the same
# base .github/workflows/release.yml uses. scripts/release.sh orchestrates:
#   --dryrun : compute version -> publishToMavenCentral (Central STAGING only;
#              nothing committed/tagged/released). Safe to run repeatedly.
#   (real)   : after a typed confirmation — update Package.swift, publish + release
#              to Maven Central (IRREVERSIBLE), commit, tag vX.Y.Z, push, and
#              `gh release create` with the XCFramework asset.
# The canonical path for team releases is still .github/workflows/release.yml;
# this task is the by-hand equivalent.
usage = '''
flag "--major" help="Bump the major version from the latest tag (X.0.0)."
flag "--minor" help="Bump the minor version (x.Y.0)."
flag "--patch" help="Bump the patch version (x.y.Z). Default if no bump flag given."
flag "--version <version>" help="Use this exact version instead of bumping."
flag "--dryrun" help="Upload to Central staging only; no release, tag, or commit."
'''
run = '''
ARGS=""
[ "{{flag(name='major')}}" = "true" ] && ARGS="$ARGS --major"
[ "{{flag(name='minor')}}" = "true" ] && ARGS="$ARGS --minor"
[ "{{flag(name='patch')}}" = "true" ] && ARGS="$ARGS --patch"
[ "{{flag(name='dryrun')}}" = "true" ] && ARGS="$ARGS --dryrun"
VERSION="{{option(name='version')}}"
[ -n "$VERSION" ] && ARGS="$ARGS --version $VERSION"
sh scripts/release.sh $ARGS
'''

# --- dependencies ----------------------------------------------------------
# Renovate (renovate.json5) opens PRs in CI; these are the local equivalents.

[tasks."dependencies:outdated"]
description = "List dependencies with newer STABLE versions (ben-manes gradle-versions-plugin)."
# Stable-only (no alpha/beta/rc/snapshot) is enforced by the rejectVersionIf
# rule on DependencyUpdatesTask in build.gradle.kts (CLAUDE.md §3) — it governs
# both this task and dependencies:update.
# --no-parallel: dependencyUpdates resolves every configuration across all
# projects, which Gradle forbids under org.gradle.parallel=true (set in
# gradle.properties). The flag overrides it for this invocation only.
run = "./gradlew dependencyUpdates --no-parallel"

[tasks."dependencies:update"]
description = "Rewrite gradle/libs.versions.toml to the latest STABLE versions, then review the diff (version-catalog-update)."
# Stable-only is enforced by the rejectVersionIf rule in build.gradle.kts
# (CLAUDE.md §3) — version-catalog-update consumes the same filtered
# dependencyUpdates output, so pre-releases never reach the catalog.
# Not truly interactive: it rewrites the catalog; review with `git diff
# gradle/libs.versions.toml` and accept or revert. A Kotlin bump is allowed by
# the filter (2.4.0 is "stable") but is still a MANUAL, SKIE-paired change —
# Kotlin is bound above by SKIE; verify SKIE supports it before committing.
# --no-parallel: versionCatalogUpdate runs dependencyUpdates internally, which
# isn't parallel-safe (see dependencies:outdated above).
run = "./gradlew versionCatalogUpdate --no-parallel"

# --- aggregates ------------------------------------------------------------

[tasks.ci]
description = "Run the exact CI sequence locally: check + release XCFramework."
run = "./gradlew :src:check :src-testing:check :src:assembleSrcXCFramework"

[tasks.clean]
description = "Gradle clean."
run = "./gradlew clean"

# --- template rendering ----------------------------------------------------
# This task (and scripts/init.sh) are REMOVED when the template is rendered.

[tasks.init]
description = "Render this template into a real project. Usage: mise run init <name> [--group g] [--org o] [--display-name 'Name']"
# Raw args are forwarded so scripts/init.sh owns parsing + validation.
run = "sh scripts/init.sh {{arg(name='args', var=true)}}"
