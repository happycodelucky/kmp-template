# __DISPLAY_NAME__ docs site.
#
# Source of truth for docs structure. Auto-discovery is deliberately disabled —
# explicit `nav:` keeps page ordering deterministic, the way Wire does it.
#
# Build:
#   .venv/bin/mkdocs serve   # local preview at http://localhost:8000
#   .venv/bin/mkdocs build --strict   # fails on broken internal links / nav drift

site_name: __DISPLAY_NAME__
site_description: A Kotlin Multiplatform library for iOS, macOS, Android, and JVM.
site_url: https://happycodelucky.github.io/__PROJECT_NAME__/
repo_name: happycodelucky/__PROJECT_NAME__
repo_url: https://github.com/happycodelucky/__PROJECT_NAME__
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Paul Bates

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link        # link Android/iOS/macOS tabs across pages
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  # Core
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  # PyMdown — same set Wire uses, plus a couple we want for callouts.
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  # mkdocs-macros: lets markdown use {{ version }} placeholders that resolve
  # at build time. `main.py` in the repo root computes `version` from the
  # latest published GitHub release (or `main` in local dev), so version
  # pins in install snippets stay in lockstep with the actual release.
  - macros:
      module_name: main

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/happycodelucky/__PROJECT_NAME__

# Explicit nav — never auto-discovered. Page ordering matters; this file is the truth.
nav:
  - Overview: index.md
  - Getting started: getting-started.md
  - Installation: installation.md
  - Concepts:
    - concepts/architecture.md
  - Recipes:
    - recipes/example.md
  - Platforms:
    - platforms/android.md
    - platforms/ios.md
    - platforms/macos.md
    - platforms/jvm.md
  - Changelog: changelog.md

# Strict mode: fail the build on a broken link or a dead anchor.
strict: true
